<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>九阴真经账号分期计算器</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #d9e2f1;
      --text: #1f2a37;
      --muted: #5b6778;
      --primary: #0d6efd;
      --primary-hover: #0b5ed7;
      --ok: #1f8b4c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, #dde9ff 0%, transparent 30%),
        radial-gradient(circle at 90% 100%, #e3ffe8 0%, transparent 35%),
        var(--bg);
      padding: 16px;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(20, 49, 90, 0.06);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      padding-right: 38px;
      line-height: 1.3;
      cursor: pointer;
      background-image:
        linear-gradient(45deg, transparent 50%, #7b8797 50%),
        linear-gradient(135deg, #7b8797 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 2px),
        calc(100% - 12px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    input:focus,
    select:focus {
      border-color: #8cb6ff;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.14);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .result {
      margin-top: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fcfdff;
      color: #1f2a37;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-light {
      background: #eef4ff;
      color: #1b4d9e;
    }

    .copied {
      color: var(--ok);
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>九阴真经账号分期计算器</h1>
      <p class="desc">输入号款、首付方式、利息计算方式、期数和购买日期，自动计算分期并生成可发给客户的文本。</p>
    </section>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="totalPrice">号款（元）</label>
          <input id="totalPrice" type="number" min="0" step="0.01" value="15300">
        </div>
        <div class="field">
          <label for="downMode">首付方式</label>
          <select id="downMode">
            <option value="rate">按比例</option>
            <option value="amount">固定金额</option>
          </select>
        </div>
        <div class="field" id="downRateField">
          <label for="downRate">首付款比例（%）</label>
          <input id="downRate" type="number" min="0" max="100" step="0.01" value="40">
        </div>
        <div class="field" id="downAmountField" style="display:none;">
          <label for="downAmount">首付金额（元）</label>
          <input id="downAmount" type="number" min="0" step="0.01" value="0">
        </div>
        <div class="field">
          <label for="periods">期数（每期 1 个月）</label>
          <input id="periods" type="number" min="1" step="1" value="3">
        </div>
        <div class="field">
          <label for="interestMode">利息计算方式</label>
          <select id="interestMode">
            <option value="annual">固定年化</option>
            <option value="fixed">每期固定利息</option>
          </select>
        </div>
        <div class="field" id="annualRateField">
          <label for="annualRate">每期利息比例输入（年化 %）</label>
          <input id="annualRate" type="number" min="0" step="0.01" value="30">
          <div class="hint">自动折算月利率：<span id="monthlyRateText">2.5%</span></div>
        </div>
        <div class="field" id="fixedInterestField" style="display:none;">
          <label for="fixedInterest">每期固定利息（元）</label>
          <input id="fixedInterest" type="number" min="0" step="0.01" value="0">
          <div class="hint">该模式下每期利息为固定值，不按年化比例换算。</div>
        </div>
        <div class="field">
          <label for="purchaseDate">购买日期</label>
          <input id="purchaseDate" type="date">
          <div class="hint">第一期时间自动为购买日期后 1 个月同一日（超出当月天数自动取月底）</div>
        </div>
      </div>

      <div class="result" id="result"></div>

      <div class="buttons">
        <button class="btn-primary" id="calcBtn" type="button">重新计算</button>
        <button class="btn-light" id="copyBtn" type="button">复制客户文本</button>
        <button class="btn-light" id="resetBtn" type="button">恢复默认</button>
      </div>
      <div class="copied" id="copyState"></div>
    </section>

  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const totalPriceEl = $("totalPrice");
    const downModeEl = $("downMode");
    const downRateFieldEl = $("downRateField");
    const downAmountFieldEl = $("downAmountField");
    const downRateEl = $("downRate");
    const downAmountEl = $("downAmount");
    const periodsEl = $("periods");
    const interestModeEl = $("interestMode");
    const annualRateFieldEl = $("annualRateField");
    const annualRateEl = $("annualRate");
    const fixedInterestFieldEl = $("fixedInterestField");
    const fixedInterestEl = $("fixedInterest");
    const purchaseDateEl = $("purchaseDate");
    const monthlyRateTextEl = $("monthlyRateText");
    const resultEl = $("result");
    const copyStateEl = $("copyState");
    let latestCopyText = "";

    function pad(n) {
      return n < 10 ? "0" + n : String(n);
    }

    function getTodayYmd() {
      const now = new Date();
      return now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate());
    }

    function ensurePurchaseDateToday() {
      const today = getTodayYmd();
      if (purchaseDateEl.value !== today) {
        purchaseDateEl.value = today;
      }
    }

    function formatDateCN(dateString) {
      if (!dateString) return "";
      const d = new Date(dateString + "T00:00:00");
      if (Number.isNaN(d.getTime())) return "";
      return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
    }

    function addMonth(dateObj, n) {
      const copy = new Date(dateObj.getTime());
      const day = copy.getDate();
      copy.setDate(1);
      copy.setMonth(copy.getMonth() + n);
      const maxDay = new Date(copy.getFullYear(), copy.getMonth() + 1, 0).getDate();
      copy.setDate(Math.min(day, maxDay));
      return copy;
    }

    function asNum(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function fmtMoney(n) {
      return asNum(n).toFixed(6).replace(/\.?0+$/, "");
    }

    function buildCustomerText(data) {
      const {
        totalPrice,
        downPayment,
        tailPayment,
        periods,
        principalPerMonth,
        interestPerMonth,
        eachPayment,
        purchaseDateCn,
        firstInstallmentDateCn
      } = data;

      const lines = [];
      lines.push("价格：" + fmtMoney(totalPrice));
      lines.push("首付：" + fmtMoney(downPayment));
      lines.push("尾款：" + fmtMoney(totalPrice) + "-" + fmtMoney(downPayment) + "=" + fmtMoney(tailPayment));
      lines.push("期数：" + periods);
      lines.push("每期：" + fmtMoney(tailPayment) + "/" + periods + "=" + fmtMoney(principalPerMonth) + "+" + fmtMoney(interestPerMonth) + "=" + fmtMoney(eachPayment));
      if (purchaseDateCn) lines.push("购买日期：" + purchaseDateCn);
      if (firstInstallmentDateCn) lines.push("第一期 " + firstInstallmentDateCn + " 待收");
      return lines.join("\n");
    }

    function toggleDownInputMode() {
      const isRate = downModeEl.value === "rate";
      downRateFieldEl.style.display = isRate ? "" : "none";
      downAmountFieldEl.style.display = isRate ? "none" : "";
    }

    function toggleInterestInputMode() {
      const isAnnual = interestModeEl.value === "annual";
      annualRateFieldEl.style.display = isAnnual ? "" : "none";
      fixedInterestFieldEl.style.display = isAnnual ? "none" : "";
    }

    function calc() {
      const totalPrice = Math.max(0, asNum(totalPriceEl.value));
      const downMode = downModeEl.value;
      const periods = Math.max(1, Math.floor(asNum(periodsEl.value, 3)));
      const interestMode = interestModeEl.value;
      const annualRate = Math.max(0, asNum(annualRateEl.value, 0));

      let downPayment = 0;
      let downRate = 0;
      if (downMode === "amount") {
        downPayment = Math.min(totalPrice, Math.max(0, asNum(downAmountEl.value, 0)));
        downRate = totalPrice > 0 ? downPayment / totalPrice * 100 : 0;
      } else {
        downRate = Math.min(100, Math.max(0, asNum(downRateEl.value, 40)));
        downPayment = totalPrice * downRate / 100;
        downAmountEl.value = fmtMoney(downPayment);
      }
      const tailPayment = totalPrice - downPayment;
      const principalPerMonth = tailPayment / periods;
      let monthlyRate = annualRate / 12 / 100;
      let interestPerMonth = 0;
      if (interestMode === "fixed") {
        interestPerMonth = Math.max(0, asNum(fixedInterestEl.value, 0));
        monthlyRate = tailPayment > 0 ? interestPerMonth / tailPayment : 0;
      } else {
        interestPerMonth = tailPayment * monthlyRate;
      }
      const eachPayment = principalPerMonth + interestPerMonth;
      const purchaseDateValue = purchaseDateEl.value;
      const purchaseDateCn = formatDateCN(purchaseDateValue);
      const firstInstallmentDate = purchaseDateValue
        ? addMonth(new Date(purchaseDateValue + "T00:00:00"), 1)
        : null;
      const firstInstallmentDateCn = firstInstallmentDate
        ? firstInstallmentDate.getFullYear() + "年" + (firstInstallmentDate.getMonth() + 1) + "月" + firstInstallmentDate.getDate() + "日"
        : "";

      monthlyRateTextEl.textContent = (monthlyRate * 100).toFixed(4).replace(/\.?0+$/, "") + "%";

      latestCopyText = buildCustomerText({
        totalPrice,
        downPayment,
        tailPayment,
        periods,
        principalPerMonth,
        interestPerMonth,
        eachPayment,
        purchaseDateCn,
        firstInstallmentDateCn
      });
      resultEl.textContent = latestCopyText;
      copyStateEl.textContent = "";
    }

    async function copyText() {
      const text = latestCopyText;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        copyStateEl.textContent = "已复制，可直接粘贴给客户。";
      } catch (err) {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        copyStateEl.textContent = "已复制，可直接粘贴给客户。";
      }
    }

    function resetDefaults() {
      totalPriceEl.value = "15300";
      downModeEl.value = "rate";
      downRateEl.value = "40";
      downAmountEl.value = "0";
      periodsEl.value = "3";
      interestModeEl.value = "annual";
      annualRateEl.value = "30";
      fixedInterestEl.value = "0";
      ensurePurchaseDateToday();
      toggleDownInputMode();
      toggleInterestInputMode();
      calc();
    }

    $("calcBtn").addEventListener("click", calc);
    $("copyBtn").addEventListener("click", copyText);
    $("resetBtn").addEventListener("click", resetDefaults);

    downModeEl.addEventListener("change", () => {
      toggleDownInputMode();
      calc();
    });

    interestModeEl.addEventListener("change", () => {
      toggleInterestInputMode();
      calc();
    });

    [totalPriceEl, downRateEl, downAmountEl, periodsEl, annualRateEl, fixedInterestEl, purchaseDateEl].forEach((el) => {
      el.addEventListener("input", calc);
      el.addEventListener("change", calc);
    });

    resetDefaults();
  </script>
</body>
</html>
